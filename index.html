<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#c0392b" />
  <meta name="description" content="Birdex — a Pokédex of real-world birds, built from your eBird life list. Fully offline, no account." />
  <title>Birdex</title>
  <link rel="icon" type="image/svg+xml" href="./assets/icons/icon.svg" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./assets/icons/icon-192.png" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <header id="topbar">
    <div class="brand"><span class="brand-mark">🪶</span><span class="brand-name">Birdex</span></div>
    <div class="search-wrap"><input id="search" type="search" autocomplete="off" spellcheck="false" /></div>
    <div class="topbar-controls">
      <select id="region-picker" class="sel" aria-label="Region"></select>
      <button id="lang-btn" class="icon-btn" type="button" title="Language">🌐</button>
      <button id="reimport-btn" class="icon-btn" type="button" title="Import">🔄</button>
    </div>
  </header>

  <div id="filters" class="filters"></div>

  <main id="view"></main>

  <nav id="tabbar">
    <button class="tab" data-route="dex" type="button"><span class="tab-ico">🗂️</span><span class="tab-lbl">Dex</span></button>
    <button class="tab" data-route="stats" type="button"><span class="tab-ico">📊</span><span class="tab-lbl">Stats</span></button>
    <button class="tab" data-route="badges" type="button"><span class="tab-ico">🏅</span><span class="tab-lbl">Badges</span></button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <div id="overlay-root"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
